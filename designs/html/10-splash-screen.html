<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stride - Every Step Counts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c0f425",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1e2210",
                        "neutral-dark": "#181c0d",
                        "neutral-muted": "#46483d",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .bg-mesh {
            background-color: #f8f8f5;
            background-image: 
                radial-gradient(at 0% 0%, rgba(192, 244, 37, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(192, 244, 37, 0.1) 0px, transparent 50%);
        }
        .motion-lines {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(192, 244, 37, 0.05) 40px,
                rgba(192, 244, 37, 0.05) 80px
            );
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-neutral-dark dark:text-white antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-mesh overflow-hidden">
<!-- Top App Bar / Brand Header -->
<div class="flex items-center justify-center p-6 mt-8">
<div class="flex flex-col items-center gap-2">
<div class="bg-primary text-neutral-dark p-3 rounded-xl shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl block" style="font-variation-settings: 'FILL' 1, 'wght' 700;">
                        bolt
                    </span>
</div>
<h2 class="text-neutral-dark dark:text-white text-3xl font-extrabold tracking-tight">Stride</h2>
</div>
</div>
<!-- Hero Content Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6 text-center z-10">
<div class="relative w-full max-w-md">
<!-- Abstract Background Elements -->
<div class="absolute inset-0 motion-lines -z-10 opacity-60 rounded-full blur-3xl scale-150"></div>
<h1 class="text-neutral-dark dark:text-white tracking-tighter text-6xl md:text-7xl font-extrabold leading-tight mb-4">
                    Every Step <br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-neutral-dark via-primary to-primary/80">Counts</span>
</h1>
<p class="text-neutral-muted dark:text-primary/70 text-lg md:text-xl font-medium max-w-[280px] mx-auto leading-relaxed">
                    Join the challenge. Reach your peak performance today.
                </p>
</div>
</div>
<!-- Decorative Image / Graphic Container -->
<div class="relative w-full h-48 md:h-64 flex items-center justify-center overflow-hidden">
<div class="w-full h-full max-w-lg relative">
<div class="absolute inset-0 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent z-10"></div>
<!-- Abstract Running Track Visualization -->
<div class="flex gap-4 justify-center items-end h-full px-8 pb-4">
<div class="w-2 bg-primary/20 h-1/2 rounded-full"></div>
<div class="w-2 bg-primary/40 h-3/4 rounded-full"></div>
<div class="w-2 bg-primary/60 h-2/3 rounded-full"></div>
<div class="w-2 bg-primary h-full rounded-full shadow-[0_0_15px_rgba(192,244,37,0.5)]"></div>
<div class="w-2 bg-primary/60 h-2/3 rounded-full"></div>
<div class="w-2 bg-primary/40 h-3/4 rounded-full"></div>
<div class="w-2 bg-primary/20 h-1/2 rounded-full"></div>
</div>
</div>
</div>
<!-- Action Section -->
<div class="p-6 pb-12 w-full max-w-md mx-auto flex flex-col gap-4">
<button class="w-full bg-primary text-neutral-dark hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200 h-16 rounded-xl shadow-xl shadow-primary/30 flex items-center justify-center gap-3 group">
<span class="text-lg font-extrabold uppercase tracking-wider">Get Started</span>
<span class="material-symbols-outlined font-bold group-hover:translate-x-1 transition-transform">
                    arrow_forward
                </span>
</button>
<div class="flex flex-col items-center gap-2">
<button class="text-neutral-muted dark:text-white/60 text-sm font-semibold hover:text-neutral-dark dark:hover:text-primary transition-colors">
                    Already have an account? <span class="text-neutral-dark dark:text-primary font-bold">Sign In</span>
</button>
</div>
</div>
<!-- Subtle Navigation Indicator -->
<div class="flex justify-center pb-4">
<div class="w-12 h-1 bg-neutral-dark/10 dark:bg-white/10 rounded-full"></div>
</div>
</div>
<!-- Background Decorative Circles -->
<div class="fixed -top-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-80 h-80 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
