                "primary": "#c0f425",
                "background-light": "#f8f8f5",

                "display": ["Lexend"]

        body {
            font-family: 'Lexend', sans-serif;

        }

<body class="bg-background-light dark:bg-background-dark text-[#181c0d] font-display">
<div class="flex flex-col min-h-screen max-w-md mx-auto bg-background-light dark:bg-background-dark relative pb-24">
<!-- Top Navigation -->
<header class="flex items-center px-4 py-6 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-xl font-bold flex-1 text-center pr-10">New Challenge</h1>
</header>
<main class="flex-1 px-4 space-y-8">
<!-- Challenge Name Section -->
<section class="space-y-3">
<label class="block">
<span class="text-sm font-semibold ml-1 mb-2 block text-[#181c0d]/70">CHALLENGE NAME</span>
<input class="w-full h-14 bg-white dark:bg-zinc-900 border-none rounded-xl px-4 text-lg focus:ring-2 focus:ring-primary transition-all placeholder:text-zinc-400 shadow-sm" placeholder="e.g., Summer Sprint" type="text"/>
</label>
</section>
<!-- Goal Setting Section -->
<section class="space-y-4">
<h3 class="text-sm font-semibold ml-1 text-[#181c0d]/70 uppercase tracking-wider">Set Your Goal</h3>
<div class="bg-white dark:bg-zinc-900 p-1.5 rounded-xl flex shadow-sm border border-zinc-100 dark:border-zinc-800">
<button class="flex-1 py-2.5 rounded-lg bg-primary text-black font-semibold text-sm transition-all">
                        Total Steps
                    </button>
<button class="flex-1 py-2.5 rounded-lg text-zinc-500 font-medium text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all">
                        Daily Average
                    </button>
</div>
<div class="relative group">
<input class="w-full h-16 bg-white dark:bg-zinc-900 border-none rounded-xl pl-12 pr-4 text-2xl font-bold focus:ring-2 focus:ring-primary shadow-sm" placeholder="50,000" type="number"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 group-focus-within:text-primary">
                        footprint
                    </span>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-zinc-400">STEPS</span>
</div>
</section>
<!-- Duration Selection -->
<section class="space-y-3">
<h3 class="text-sm font-semibold ml-1 text-[#181c0d]/70 uppercase tracking-wider">Duration</h3>
<div class="flex gap-3 overflow-x-auto hide-scrollbar py-1">
<button class="flex-none px-6 py-3 rounded-xl bg-white dark:bg-zinc-900 border-2 border-primary text-black font-bold shadow-sm">
                        3 Days
                    </button>
<button class="flex-none px-6 py-3 rounded-xl bg-white dark:bg-zinc-900 border-2 border-transparent text-zinc-500 font-medium hover:border-zinc-200 transition-all shadow-sm">
                        1 Week

<button class="flex-none px-6 py-3 rounded-xl bg-white dark:bg-zinc-900 border-2 border-transparent text-zinc-500 font-medium hover:border-zinc-200 transition-all shadow-sm">
                        2 Weeks
                    </button>
<button class="flex-none px-6 py-3 rounded-xl bg-white dark:bg-zinc-900 border-2 border-transparent text-zinc-500 font-medium hover:border-zinc-200 transition-all shadow-sm">

</div>
